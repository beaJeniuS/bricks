<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bricks layout</title>
    <link rel="stylesheet" href="./normalize.css" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./scripts.js" defer type="module"></script>
  </head>

      <button class="dialog-button image-button" id="btn-save">
        <svg
          width="32"
          heigth="32"
          xmlns="http://www.w3.org/2000/svg"
          xml:space="preserve"
          viewBox="0 0 20 20"
          id="save"
        >
          <path
            class="active-el"
            d="M15.173 2H4c-1.101 0-2 .9-2 2v12c0 1.1.899 2 2 2h12c1.101 0 2-.9 2-2V5.127L15.173 2zM14 8c0 .549-.45 1-1 1H7c-.55 0-1-.451-1-1V3h8v5zm-1-4h-2v4h2V4z"
          ></path>
        </svg>
        <span>Сохранить</span>
      </button>
      <button class="dialog-button image-button" id="btn-save-all">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          xml:space="preserve"
          viewBox="0 0 20 20"
          id="save"
        >
          <path
            style="transform: translate(2px, 2px); fill: #000000"
            d="M15.173 2H4c-1.101 0-2 .9-2 2v12c0 1.1.899 2 2 2h12c1.101 0 2-.9 2-2V5.127L15.173 2zM14 8c0 .549-.45 1-1 1H7c-.55 0-1-.451-1-1V3h8v5zm-1-4h-2v4h2V4z"
          ></path>
          <path
            class="active-el"
            d="M15.173 2H4c-1.101 0-2 .9-2 2v12c0 1.1.899 2 2 2h12c1.101 0 2-.9 2-2V5.127L15.173 2zM14 8c0 .549-.45 1-1 1H7c-.55 0-1-.451-1-1V3h8v5zm-1-4h-2v4h2V4z"
          ></path>
        </svg>
        <span>Сохранить все</span>
      </button>
      <button class="dialog-button" id="btn-saveas">Сохранить как...</button>
      <button class="dialog-button image-button" id="btn-delete">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="32"
          height="32"
          fill="none"
          viewBox="0 0 32 32"
          id="cross"
        >
          <path
            class="active-el"
            style="box-shadow: 1px 1px 3px #000000"
            d="M24.8787 2.87868C26.0503 1.70711 27.9497 1.70711 29.1213 2.87868C30.2929 4.05025 30.2929 5.94975 29.1213 7.12132L20.331 15.9116C20.2822 15.9604 20.2822 16.0396 20.331 16.0884L29.1213 24.8787C30.2929 26.0503 30.2929 27.9497 29.1213 29.1213C27.9497 30.2929 26.0503 30.2929 24.8787 29.1213L16.0884 20.331C16.0396 20.2822 15.9604 20.2822 15.9116 20.331L7.12132 29.1213C5.94975 30.2929 4.05025 30.2929 2.87868 29.1213C1.70711 27.9497 1.70711 26.0503 2.87868 24.8787L11.669 16.0884C11.7178 16.0396 11.7178 15.9604 11.669 15.9116L2.87868 7.12132C1.70711 5.94975 1.70711 4.05025 2.87868 2.87868C4.05025 1.70711 5.94975 1.70711 7.12132 2.87868L15.9116 11.669C15.9604 11.7178 16.0396 11.7178 16.0884 11.669L24.8787 2.87868Z"

      <button class="dialog-button image-button" id="btn-load">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 32 32"
          width="32"
          height="32"
          id="loading"
        >

          ></path>
        </svg>
        <span>Загрузить</span>
      </button>
    </div>
    <div class="controls">
      <label for="layout-name">
        <span>Раскладка</span>
        <select id="layout-name" type=""></select>
      </label>

      <label for="rows-count">
        <span>Ряды</span>
        <input id="rows-count" type="number" value="28" />
      </label>

      <label for="bricks-count">
        <span>Кирпичи</span>
        <input id="bricks-count" type="number" value="22" />
      </label>

      <label for="cb-show-numbers">
        <span>Цифры</span>
        <input id="cb-show-numbers" type="checkbox" />
      </label>
    </div>
    <div class="colors">
      <div class="colors-btns"></div>
      <div class="colors-samples"></div>
    </div>
    <div class="layout-container">
      <div class="layout"></div>
    </div>
    <div class="reports">
      <div class="reports-panel"></div>
      <div class="reports-list"></div>
    </div>
  </body>
</html>
